[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tehuti-guard-api"
version = "0.2.0"
description = "Tehuti Guard decision API — Sentinel posture + MaatBench covenant compile/enforce (Python)"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }

[project.scripts]
tehuti-guard-serve = "tehuti_guard.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["tehuti_guard"]

[tool.hatch.build.targets.sdist]
include = ["tehuti_guard", "README.md", "pyproject.toml"]
